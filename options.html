<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
        width: 360px;
        padding: 16px;
        margin: 0;
      }
      h2 { font-size: 16px; margin: 0 0 16px; }
      .field { margin-bottom: 14px; }
      label { display: block; font-size: 13px; font-weight: 500; margin-bottom: 4px; }
      input[type="password"], select, input[type="text"] {
        width: 100%;
        padding: 6px 8px;
        font-size: 13px;
        border: 1px solid #d1d9e0;
        border-radius: 6px;
        box-sizing: border-box;
        background: #fff;
      }
      .hint { font-size: 11px; color: #656d76; margin-top: 4px; }
      button {
        margin-top: 12px;
        padding: 6px 16px;
        font-size: 13px;
        font-weight: 500;
        background: #1f883d;
        color: #fff;
        border: none;
        border-radius: 6px;
        cursor: pointer;
      }
      button:hover { background: #1a7f37; }
      .status { font-size: 12px; margin-top: 8px; color: #1a7f37; }
      .shortcut { margin-top: 16px; padding-top: 12px; border-top: 1px solid #d1d9e0; font-size: 12px; color: #656d76; }
      kbd {
        display: inline-block;
        padding: 2px 6px;
        font-size: 11px;
        font-family: ui-monospace, monospace;
        background: #f6f8fa;
        border: 1px solid #d1d9e0;
        border-radius: 4px;
      }
      .model-loading { font-size: 12px; color: #656d76; padding: 6px 0; }
      .model-price { color: #656d76; }
    </style>
  </head>
  <body>
    <h2>PR Emoji Settings</h2>

    <div class="field">
      <label for="apiKey">OpenRouter API Key</label>
      <input type="password" id="apiKey" placeholder="sk-or-..." />
      <div class="hint">Get one at <a href="https://openrouter.ai/keys" target="_blank">openrouter.ai/keys</a></div>
    </div>

    <div class="field">
      <label for="model">AI Model</label>
      <select id="model">
        <option value="">Loading models...</option>
      </select>
      <div class="hint">Only showing cheap models — emoji suggestions don't need expensive ones</div>
    </div>

    <button id="save">Save</button>
    <div id="status" class="status"></div>

    <div class="shortcut">
      Keyboard shortcut: <kbd>Ctrl</kbd>+<kbd>Shift</kbd>+<kbd>E</kbd>
      <div class="hint" style="margin-top: 2px;">Customize in <a href="about:addons" target="_blank">Add-ons</a> → ⚙️ → Manage Extension Shortcuts</div>
    </div>

    <script src="options.js"></script>
  </body>
</html>
